name: EDUSMART-CM Code Quality & CI/CD

on:
  push:
    branches: [ "develop", "main" ]
  pull_request:
    branches: [ "develop", "main" ]

jobs:
  code-quality-and-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Récupérer le code du dépôt
      uses: actions/checkout@v3

    - name: Configurer l'environnement PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, ctype, iconv, pdo, pdo_mysql, zip

    - name: Copier le fichier d'environnement de test
      run: cp .env.example .env

    - name: Installer les dépendances Composer
      run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Vérifier la syntaxe PHP (Lint)
      run: find app config database routes -type f -name "*.php" -exec php -l {} \;

    - name: Vérifier le style de code (Laravel Pint)
      run: ./vendor/bin/pint --test

    - name: Générer la clé d'application Laravel
      run: php artisan key:generate

    - name: Créer la base de données de test (SQLite)
      run: |
        mkdir -p database
        touch database/database.sqlite

    - name: Exécuter les tests unitaires & fonctionnels
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
      run: php artisan test

  deploy:
    needs: code-quality-and-tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Déploiement via SSH sur AWS EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /var/www/edusmart-cm
          git pull origin main
          docker-compose down
          docker-compose up -d --build
          docker exec edusmart-backend php artisan migrate --force
          docker exec edusmart-backend php artisan config:cache
          docker exec edusmart-backend php artisan route:cache
